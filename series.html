<!DOCTYPE html>
<html>
  <head>
    <title>Series</title>
    <link rel="stylesheet" href="styles/my-list-styles/my-list-header.css">
    <link rel="stylesheet" href="styles/series-page.main.css">
    <link rel="stylesheet" href="styles/footer.css">
  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts: Roboto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  </head>
  <body>
    <header>
      <div class="header-container">
        <div class="top-section">
          <p class="back-to-home js-back-to-home"><img src="Images & Icons/icons/my list icons/icons8-left-arrow-24.png" alt="left arrow icon" class="back-icon">Back</p>
          <h1>Series</h1>
          <div class="share-clear-container">
            <p class="share-label js-movies-label">
              Movies
            </p>
            <p class="share-label js-my-list-label">
              My List
              <img src="Images & Icons/icons/icons8-right-arrow-24.png" alt="share icon" class="share-icon">
            </p>
          </div>
        </div>
        <div class="middles-section">
          <input type="text" placeholder="Search list..." class="search-input js-search-input">
      <select class="js-select">
        <option value="">Sort</option>
        <option value="Title(A-Z)">Title (A-Z)</option>
        <option value="Year(Newest)">Year (Newest)</option>
        <option value="Year(Oldest)">Year (Oldest)</option>
      </select>
        </div>

      </div>
    </header>
    <main>
      <div class="series-card-container js-series-card-container">
        <!-- Movie cards will be dynamically inserted here -->
      </div>
    </main>
    <footer>
      <div class="footer-container">
        <div class="footer-left">© 2026 Junior Search</div>
        <div class="Privacy-container">
          <p>Privacy Policy</p>
          <p>Terms of Service</p>
        </div>
      </div>
    </footer>
    <script type="module" src="scripts/series.js"></script>
  </body>
</html>
